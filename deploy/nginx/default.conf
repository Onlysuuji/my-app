limit_req_zone $binary_remote_addr zone=app_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=youtube_search:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=youtube_resolve:10m rate=10r/m;

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream next_app {
  server app:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 16k;

  location = /api/youtube/search {
    limit_req zone=youtube_search burst=10 nodelay;
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /api/youtube/resolve {
    limit_req zone=youtube_resolve burst=5 nodelay;
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location / {
    limit_req zone=app_general burst=30 nodelay;
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
